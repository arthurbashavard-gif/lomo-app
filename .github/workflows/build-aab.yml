name: Build LoMo Android App Bundle

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Locate Android project
        shell: bash
        run: |
          set -euo pipefail

          echo "Repository files:"
          ls -la

          if [ -f "gradlew" ]; then
            echo "PROJECT_DIR=." >> "$GITHUB_ENV"
            exit 0
          fi

          EXISTING_GRADLEW="$(find . -name gradlew -type f | head -n 1 || true)"
          if [ -n "$EXISTING_GRADLEW" ]; then
            PROJECT_PATH="$(dirname "$EXISTING_GRADLEW")"
            echo "PROJECT_DIR=$PROJECT_PATH" >> "$GITHUB_ENV"
            exit 0
          fi

          ZIP_FILE=""
          if [ -f "lomo-twa-android-source.zip" ]; then
            ZIP_FILE="lomo-twa-android-source.zip"
          else
            ZIP_FILE="$(find . -name 'lomo-twa-android-source.zip' -type f | head -n 1 || true)"
          fi

          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: Could not find gradlew or lomo-twa-android-source.zip."
            echo "Upload lomo-twa-android-source.zip to the repository root, or extract the Android project files into the repository."
            exit 1
          fi

          echo "Using Android source zip: $ZIP_FILE"
          rm -rf twa-src
          mkdir -p twa-src
          unzip -q "$ZIP_FILE" -d twa-src

          PROJECT_GRADLEW="$(find twa-src -name gradlew -type f | head -n 1 || true)"
          if [ -z "$PROJECT_GRADLEW" ]; then
            echo "ERROR: The zip was found, but no gradlew file exists inside it."
            echo "The zip must contain the full Android source project, not only website files."
            exit 1
          fi

          PROJECT_PATH="$(dirname "$PROJECT_GRADLEW")"
          echo "PROJECT_DIR=$PROJECT_PATH" >> "$GITHUB_ENV"
          echo "Android project found at: $PROJECT_PATH"

      - name: Make Gradle executable
        shell: bash
        run: chmod +x "$PROJECT_DIR/gradlew"

      - name: Show Android project files
        shell: bash
        run: |
          echo "PROJECT_DIR=$PROJECT_DIR"
          ls -la "$PROJECT_DIR"
          ls -la "$PROJECT_DIR/app" || true

      - name: Build release App Bundle
        shell: bash
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew --no-daemon bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: lomo-release-aab
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
